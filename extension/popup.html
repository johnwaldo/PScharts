<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PScharts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 560px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e0e0e0;
    }

    header {
      background: #1a1d27;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a2d3a;
    }
    header h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
    header span { font-size: 20px; }

    .controls {
      padding: 14px 18px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #1e2130;
    }
    .controls input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2a2d3a;
      background: #1a1d27;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .controls input:focus { border-color: #4a9eff; }
    .controls input::placeholder { color: #555; }

    button#fetchBtn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #4a9eff;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button#fetchBtn:hover  { background: #3a8eef; }
    button#fetchBtn:disabled { background: #2a4a6a; cursor: default; }

    #status {
      padding: 8px 18px;
      font-size: 12px;
      color: #8a9bb0;
      min-height: 28px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status.error { color: #ff6b6b; }
    #status.success { color: #4caf50; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #2a4a6a;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats row */
    #stats {
      display: none;
      padding: 0 18px 12px;
      gap: 12px;
    }
    #stats.visible { display: flex; }
    .stat-box {
      flex: 1;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-box .val { font-size: 20px; font-weight: 700; color: #4a9eff; }
    .stat-box .lbl { font-size: 10px; color: #666; margin-top: 2px; }

    /* Tabs */
    #tabs { display: none; }
    #tabs.visible { display: block; }

    .tab-bar {
      display: flex;
      gap: 2px;
      padding: 0 18px;
      border-bottom: 1px solid #1e2130;
    }
    .tab-btn {
      padding: 7px 14px;
      font-size: 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #666;
      cursor: pointer;
    }
    .tab-btn.active { color: #4a9eff; border-bottom-color: #4a9eff; }

    .tab-panel { display: none; padding: 14px 18px; }
    .tab-panel.active { display: block; }

    canvas { display: block; }

    /* Debug log */
    #debugLog {
      display: none;
      margin: 0 18px 14px;
      padding: 8px;
      background: #111;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      font-size: 10px;
      color: #555;
      max-height: 80px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* Warning banner */
    #noData {
      display: none;
      margin: 0 18px 14px;
      padding: 12px;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 6px;
      color: #ff9090;
      font-size: 12px;
      line-height: 1.5;
    }

    a { color: #4a9eff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <span>🎯</span>
  <h1>PScharts</h1>
</header>

<div class="controls">
  <input id="memberInput" type="text" placeholder="USPSA member number (e.g. A12345)" />
  <button id="fetchBtn">Fetch</button>
</div>

<div id="status">Enter your member number and click Fetch.</div>

<div id="stats">
  <div class="stat-box"><div class="val" id="statMatches">—</div><div class="lbl">MATCHES</div></div>
  <div class="stat-box"><div class="val" id="statAvg">—</div><div class="lbl">AVG %</div></div>
  <div class="stat-box"><div class="val" id="statBest">—</div><div class="lbl">BEST %</div></div>
  <div class="stat-box"><div class="val" id="statDiv">—</div><div class="lbl">DIVISION</div></div>
</div>

<div id="noData">
  No score data found on the page.<br>
  Make sure you are <a href="https://practiscore.com/login" target="_blank">logged into PractiScore</a>,
  then try again. Check the debug log below for details.
</div>

<div id="tabs">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="time">Over Time</button>
    <button class="tab-btn" data-tab="dist">Distribution</button>
    <button class="tab-btn" data-tab="place">Placement</button>
    <button class="tab-btn" data-tab="raw">Raw Data</button>
  </div>
  <div class="tab-panel active" id="tab-time">
    <canvas id="chartTime" width="524" height="220"></canvas>
  </div>
  <div class="tab-panel" id="tab-dist">
    <canvas id="chartDist" width="524" height="220"></canvas>
  </div>
  <div class="tab-panel" id="tab-place">
    <canvas id="chartPlace" width="524" height="220"></canvas>
  </div>
  <div class="tab-panel" id="tab-raw">
    <pre id="rawJson" style="font-size:10px;color:#8a9bb0;white-space:pre-wrap;max-height:300px;overflow-y:auto;background:#111;padding:8px;border-radius:4px;"></pre>
  </div>
</div>

<div id="debugLog"></div>

<script src="popup.js"></script>
</body>
</html>
